name: Route53 Record Set Updates
author: Brent Garber
branding:
  icon: cloud
  color: gray-dark
description: Submit Route 53 Record Sets with enhanced validation and error handling
inputs:
  aws_access_key_id:
    description: >-
      AWS access key ID. Prefer OIDC via aws-actions/configure-aws-credentials
      instead of long-lived keys.
    required: false
    deprecationMessage: >-
      Use OIDC federation with aws-actions/configure-aws-credentials@v4 instead
      of passing static access keys.
  aws_secret_access_key:
    description: >-
      AWS secret access key. Prefer OIDC via aws-actions/configure-aws-credentials
      instead of long-lived keys.
    required: false
    deprecationMessage: >-
      Use OIDC federation with aws-actions/configure-aws-credentials@v4 instead
      of passing static access keys.
  aws_route53_hosted_zone_id:
    description: The ID of the hosted zone where the record set will be created
    required: true
  aws_route53_rr_action:
    description: The action to perform on the record set (CREATE, DELETE, UPSERT)
    required: true
  aws_route53_rr_name:
    description: The fully qualified domain name for the record set
    required: true
  aws_route53_rr_type:
    description: The DNS record type (A, AAAA, CNAME, MX, NS, PTR, SOA, SPF, SRV, TXT)
    required: true
  aws_route53_rr_ttl:
    description: The Time To Live value in seconds (0-2147483647)
    required: false
    default: '300'
  aws_route53_rr_value:
    description: The value for the record set (IP address, domain name, etc.)
    required: true
  aws_route53_rr_comment:
    description: An optional comment for the record set change
    required: false
  aws_route53_wait:
    description: Whether to wait for the change to complete (true/false)
    required: false
    default: 'false'
outputs:
  change_id:
    description: The ID of the submitted change
    value: ${{ steps.run.outputs.change_id }}
  status:
    description: The status of the change operation
    value: ${{ steps.run.outputs.status }}
  error:
    description: Error message if the operation fails
    value: ${{ steps.run.outputs.error }}
runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        python3 -m venv "${{ github.action_path }}/.venv"
        source "${{ github.action_path }}/.venv/bin/activate"
        pip install --quiet --no-cache-dir -r "${{ github.action_path }}/requirements.txt"

    - name: Run Route 53 change
      id: run
      shell: bash
      env:
        INPUT_AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
        INPUT_AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
        INPUT_AWS_ROUTE53_HOSTED_ZONE_ID: ${{ inputs.aws_route53_hosted_zone_id }}
        INPUT_AWS_ROUTE53_RR_ACTION: ${{ inputs.aws_route53_rr_action }}
        INPUT_AWS_ROUTE53_RR_NAME: ${{ inputs.aws_route53_rr_name }}
        INPUT_AWS_ROUTE53_RR_TYPE: ${{ inputs.aws_route53_rr_type }}
        INPUT_AWS_ROUTE53_RR_TTL: ${{ inputs.aws_route53_rr_ttl }}
        INPUT_AWS_ROUTE53_RR_VALUE: ${{ inputs.aws_route53_rr_value }}
        INPUT_AWS_ROUTE53_RR_COMMENT: ${{ inputs.aws_route53_rr_comment }}
        INPUT_AWS_ROUTE53_WAIT: ${{ inputs.aws_route53_wait }}
      run: |
        source "${{ github.action_path }}/.venv/bin/activate"
        python3 "${{ github.action_path }}/change.py"
